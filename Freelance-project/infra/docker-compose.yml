version: "3.9"

services:
  frontend:
    image: <ECR_REGISTRY>/frontend:latest
    container_name: healthcare-erp-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PUBLIC_API_BASE_URL: http://backend:8000
      APP_CONFIG_TOKEN: <FROM_AWS_SECRETS_MANAGER>
    networks:
      - app-network

  backend:
    image: <ECR_REGISTRY>/backend:latest
    container_name: healthcare-erp-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: 8000
      DATABASE_URL: <FROM_AWS_SECRETS_MANAGER>
      JWT_SECRET: <FROM_AWS_SECRETS_MANAGER>
      AWS_REGION: <FROM_AWS_SECRETS_MANAGER>
      SECRETS_MANAGER_DB_SECRET_ID: <FROM_AWS_SECRETS_MANAGER>
    expose:
      - "8000"
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: healthcare-erp-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
